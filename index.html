<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pompki</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Pompki</h1>
      <p>Proste narzędzie do śledzenia treningu</p>
    </header>

    <section class="card">
      <h2>Cel dzienny</h2>
      <div class="goal-row">
        <input type="number" id="goalInput" min="1" placeholder="Np. 100" />
        <button id="saveGoalBtn">Zapisz cel</button>
      </div>
      <p id="goalInfo">Aktualny cel: 0</p>
    </section>

    <section class="card">
      <h2>Dzisiaj</h2>
      <div class="add-row">
        <input type="number" id="pushupInput" min="1" placeholder="Ile zrobiłeś?" />
        <button id="addPushupsBtn">Dodaj</button>
      </div>
      <p id="todayTotal">Dzisiaj: 0</p>
      <p id="goalProgress">Postęp celu: 0%</p>
    </section>

    <section class="card">
      <h2>Statystyki</h2>
      <p id="monthTotal">Ten miesiąc: 0</p>
      <p id="yearTotal">Ten rok: 0</p>
    </section>

    <section class="card">
      <h2>Dzisiejsze wpisy</h2>
      <ul id="entriesList"></ul>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
